apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: invoice-app
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: invoice-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["/bin/sh","-c"]
          args:
            - >-
              until nc -z postgres-master.invoice-app.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done;
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["/bin/sh","-c"]
          args:
            - >-
              until nc -z kafka.invoice-app.svc.cluster.local 9092; do echo waiting for kafka; sleep 2; done;
      containers:
        - name: api
          image: invoice-app-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:password@postgres-master:5432/invoice_master
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SECRET_KEY
            - name: ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "30"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: UI_BASE_URL
              value: http://localhost:8080
            - name: MULTITENANT_MODE
              value: database_per_tenant
            - name: TENANT_DATABASE_PREFIX
              value: tenant_
            - name: MASTER_DATABASE_HOST
              value: postgres-master
            - name: MASTER_DATABASE_PORT
              value: "5432"
            - name: MASTER_DATABASE_USER
              value: postgres
            - name: MASTER_DATABASE_PASSWORD
              value: password
            - name: SLACK_VERIFICATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_VERIFICATION_TOKEN
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_BOT_TOKEN
            - name: SLACK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_CLIENT_ID
            - name: SLACK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_CLIENT_SECRET
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SLACK_SIGNING_SECRET
            - name: DEBUG
              value: "False"
            - name: LOG_LEVEL
              value: INFO
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: KAFKA_OCR_TOPIC
              value: expenses_ocr
            - name: KAFKA_OCR_GROUP
              value: invoice-app-ocr
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          command: ["/bin/sh","-c"]
          args:
            - >-
              echo 'Initializing database and running migrations...' &&
              python db_init.py &&
              echo 'Setting up Alembic migrations...' &&
              python scripts/manage_migrations.py setup || echo 'Migration setup completed or already done' &&
              echo 'Starting API server...' &&
              uvicorn main:app --host 0.0.0.0 --port 8000

